<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horas | Mateo GM</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- PWA settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                <h1>Registro de Horas</h1>
                <span class="rate-badge">Tarifa: $<span id="hourly-rate">4100</span> / h</span>
            </div>
            <p class="subtitle">Mateo GM</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" id="btnAddExpense" onclick="openExpenseModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                Cargar Gasto
            </button>
            <button class="btn" id="btnAddHours">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Cargar Horas
            </button>
        </div>
    </div>

    <div id="table-container">
        <!-- Tables will be injected here by app.js -->
    </div>

    <!-- Totals are now handled dynamically per month in app.js -->
</div>

<!-- Modal for adding hours -->
<div class="modal-overlay" id="modalAdd">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Cargar Horas</h2>
            <button class="close-btn" id="btnCloseModal">&times;</button>
        </div>
        <form id="addHoursForm">
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="inputDate" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Hora Inicio</label>
                    <input type="time" id="inputStart" value="14:00" required>
                </div>
                <div class="form-group">
                    <label>Hora Fin</label>
                    <input type="time" id="inputEnd" value="18:00" required>
                </div>
            </div>

            <div class="form-group">
                <label>Observaciones (opcional)</label>
                <input type="text" id="inputObs" placeholder="Ej: Excepción 5hs">
            </div>

            <button type="submit" class="btn" style="width: 100%; justify-content: center; margin-top: 10px;">Guardar Horas</button>
        </form>
    </div>
</div>

<!-- Modal for adding expenses -->
<div class="modal-overlay" id="modalExpenseAdd">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Cargar Nuevo Gasto</h2>
            <button class="close-btn" id="btnCloseExpenseModal">&times;</button>
        </div>
        <form id="addExpenseForm">
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="inputExpenseDate" required>
            </div>
            <div class="form-group">
                <label>Motivo (Ej: Pasaje Bondi)</label>
                <input type="text" id="inputExpenseDesc" required>
            </div>
            <div class="form-group">
                <label>Monto ($)</label>
                <input type="number" id="inputExpenseAmount" min="1" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; justify-content: center; margin-top: 10px; background-color: #ef4444;">Guardar Gasto</button>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
